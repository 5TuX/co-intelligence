# User profile for job search skill
# Copy this directory to users/<your-handle>/ and customize
# Or use /job-search new-user for an interactive setup

name: Your Name
handle: your-handle  # lowercase, no spaces — must match directory name

# Location priority (1 = most preferred)
location_priority:
  1: "Your City / Region"
  2: "Remote"
  3: "Anywhere in your country"
  4: "Abroad"
location_notes: >
  Add nuance here. Examples:
  - "Willing to relocate for the right role"
  - "Remote-first preferred, occasional travel OK"
  - "Coastal cities are a plus"

# Skills and experience
skills:
  strong:
    - Python
    # Add your core skills here
  learning:
    - Docker
    # Skills you're actively building
  gaps:
    - Kubernetes
    # Skills you want to develop

# Ethical filtering — what you want and what you don't
ethical_filter:
  exclude:
    - "Example: surveillance tech"
    - "Example: gambling / betting platforms"
    # Companies or sectors you want to avoid entirely
  exclude_notes: >
    Add nuance here. Example:
    "Skip non-technical roles even if the company is interesting."
  prioritize:
    - "Healthcare / medtech"
    - "Open source"
    # Sectors you're excited about — these get a scoring boost
  also_look_for: >
    Non-obvious roles where your skills are valuable.
    Example: "museum tech, audio post-production, environmental monitoring"

# Specific companies, labs, or institutions to always check
search_notes:
  - "Check <your-favorite-company> careers page"
  - "Look at <local-university> lab openings"

# Shared feedback files to load (paths relative to skill root)
feedback_files:
  - reference/feedback_cv_honesty.md
