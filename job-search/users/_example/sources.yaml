# User-specific job sources
# These are checked in addition to sources-general.yaml
# Add job boards, company career pages, and niche sources specific to your search
#
# Fields:
#   name: Human-readable name
#   url: Direct URL to the job listing page
#   keywords: Search terms to use on this source
#   priority: 1 (highest) to 5 (lowest)
#   source_type: board | careers_page | announcement | news (default: board)
#   published_date: For announcements/news — original publish date (YYYY-MM-DD)
#   last_checked: Date this source was last validated (YYYY-MM-DD)
#   discovered: Date this source was added (YYYY-MM-DD)
#   recommended_by: How you found this source

sources:
  # Example: Local job board
  - name: Example Local Tech Jobs
    url: https://example.com/tech-jobs
    keywords: [python, ML, AI]
    priority: 1
    last_checked: 2026-01-01

  # Example: Company careers page
  - name: Example Corp Careers
    url: https://example.com/careers
    keywords: [AI, engineer]
    priority: 2
    source_type: careers_page
    discovered: 2026-01-01

  # Example: Institutional portal
  # - name: Your University Job Board
  #   url: https://university.edu/jobs
  #   keywords: [research, postdoc, AI]
  #   priority: 1
